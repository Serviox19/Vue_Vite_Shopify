name: Deploy Shopify Theme

on:
  push:
    branches:
      - dev
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - branch: dev
            theme_id: 142881030227
            environment: development
            allow_live: false
          - branch: master
            theme_id: 147278102611
            environment: production
            allow_live: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        if: github.ref_name == matrix.branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
        if: github.ref_name == matrix.branch

      - name: Install dependencies
        run: npm ci
        if: github.ref_name == matrix.branch

      - name: Build
        run: npm run build
        if: github.ref_name == matrix.branch

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli
        if: github.ref_name == matrix.branch

      - name: Deploy to ${{ matrix.environment }}
        run: |
          echo "=== Deploying from dist/ folder ==="
          ls -la dist/ || echo "ERROR: dist/ folder not found!"

          cd dist

          shopify theme push \
            --theme=${{ matrix.theme_id }} \
            --store=${{ secrets.SHOPIFY_FLAG_STORE }} \
            --password=${{ secrets.SHOPIFY_CLI_THEME_TOKEN }} \
            --json \
            --ignore="templates/*.json" \  # ← Only ignore template JSONs
            ${{ matrix.allow_live == true && '--allow-live' || '' }} \
            --force
        if: github.ref_name == matrix.branch
