name: Deploy Shopify Theme

on:
  push:
    branches:
      - dev
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - branch: dev
            theme_id: 142881030227
            environment: development
            allow_live: false
          - branch: master
            theme_id: 147278102611
            environment: production
            allow_live: true

    # Only run for the matching branch
    if: github.ref == format('refs/heads/{0}', matrix.branch)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (if needed)
        run: npm run build
        # Remove or comment out if your theme has no build step

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli

      - name: Deploy to ${{ matrix.environment }}
        run: |
          shopify theme push \
            --theme=${{ matrix.theme_id }} \
            --store=${{ secrets.SHOPIFY_FLAG_STORE }} \
            --password=${{ secrets.SHOPIFY_CLI_THEME_TOKEN }} \
            --json \
            ${{ matrix.allow_live == true && '--allow-live' || '' }} \
            --force
