name: Deploy Shopify Theme (Production)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli

      - name: Deploy to production
        run: |
          echo "=== Deploying from dist/ folder ==="
          ls -la dist/ || echo "ERROR: dist/ folder not found!"

          cd dist

          shopify theme push \
            --theme=147278102611 \
            --store=${{ secrets.SHOPIFY_FLAG_STORE }} \
            --password=${{ secrets.SHOPIFY_CLI_THEME_TOKEN }} \
            --json \
            --ignore="config/settings_data.json" \
            --ignore="templates/*.json" \
            --allow-live \
            --force
